</div>

</div>
<button class="mt-stack-sm w-full bg-primary text-white font-label-md text-label-md py-3 px-4 rounded flex items-center justify-center gap-2 hover:bg-surface-tint transition-colors active:scale-95 shadow-sm" type="submit">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">chat</span>
                    በዋትስአፕ ይላኩ
                </button>

<div class="mt-stack-md pt-stack-sm border-t border-surface-variant text-center">
<p class="font-body-md text-label-md text-on-surface-variant">በ 5 ደቂቃ ውስጥ እንደውልልዎታለን!</p>

<script>
    const cards = document.querySelectorAll('.service-card');
    const modal = document.getElementById('booking-modal');
    const closeBtn = modal.querySelector('button[aria-label="Close"]');
    const form = modal.querySelector('form');
    const selectedProfessionInput = document.getElementById('selected-profession');

    cards.forEach(card => {
        card.addEventListener('click', () => {
            selectedProfessionInput.value = card.getAttribute('data-profession');
            modal.classList.remove('hidden');
        });
    });

    closeBtn.addEventListener('click', () => {
        modal.classList.add('hidden');
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const profession = selectedProfessionInput.value;
        const name = document.getElementById('user-name').value;
        const phone = document.getElementById('user-phone').value;
        const email = document.getElementById('user-email').value;
        const submitBtn = form.querySelector('button[type="submit"]');

        // Show loading state
        const originalBtnText = submitBtn.innerHTML;
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> በመላክ ላይ...';

        // 1. Send data to Google Apps Script (AI System)
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbz45AFZggp1xyHBoHjJnVq3KfWRr1lvH1BgMeVAIouNh_rBUfSyusy7PtpHPDq6wXcg/exec';

        try {
            if (scriptUrl) {
                await fetch(scriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        source: 'website',
                        profession: profession,
                        name: name,
                        phone: phone,
                        email: email
                    })
                });
            }
        } catch (error) {
            console.error('Error sending to AI System:', error);
        }

        // 2. Open WhatsApp (Secondary action)
        const whatsappNumber = "251943543986";
        const message = `ሰላም ConnectBahirdar፣ አዲስ የጥገና ጥያቄ አለ፦\nባለሙያ፦ ${profession}\nስም፦ ${name}\nስልክ፦ ${phone}${email ? `\nኢሜይል፦ ${email}` : ''}`;
        const whatsappUrl = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;
        window.open(whatsappUrl, '_blank');

        // Reset form and close modal
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalBtnText;
        modal.classList.add('hidden');
        form.reset();
    });
</script>

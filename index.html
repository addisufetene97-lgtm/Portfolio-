<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectBahirDar | መግቢያ ገጽ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans Ethiopic', sans-serif;
            background-color: #f8fafc;
        }
        .portal-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .portal-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <header class="text-center mb-12">
        <h1 class="text-5xl font-black text-slate-800 mb-2" style="font-family:'Playfair Display',serif;">
            Connect<span class="text-teal-600">BahirDar</span>
        </h1>
        <p class="text-slate-500 text-lg">የሚፈልጉትን አገልግሎት ይምረጡ</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl w-full">
        <!-- Rental Portal -->
        <a href="rental/index.html" class="portal-card bg-white rounded-3xl overflow-hidden shadow-lg border border-slate-100 flex flex-col">
            <div class="h-48 bg-gradient-to-br from-teal-500 to-cyan-600 flex items-center justify-center">
                <span class="text-6xl">🏠</span>
            </div>
            <div class="p-8">
                <h2 class="text-2xl font-bold text-slate-800 mb-2">የቤት ኪራይ</h2>
                <p class="text-slate-600">ቤቶን ያከራዩ ወይም የሚከራይ ቤት ይፈልጉ። ቀላል እና ፈጣን የቤት ኪራይ አስተዳደር።</p>
                <div class="mt-6 inline-flex items-center text-teal-600 font-bold">
                    ይግቡ <span class="ml-2">→</span>
                </div>
            </div>
        </a>

        <!-- Services Portal -->
        <a href="services/index.html" class="portal-card bg-white rounded-3xl overflow-hidden shadow-lg border border-slate-100 flex flex-col">
            <div class="h-48 bg-gradient-to-br from-amber-400 to-orange-500 flex items-center justify-center">
                <span class="text-6xl">🛠️</span>
            </div>
            <div class="p-8">
                <h2 class="text-2xl font-bold text-slate-800 mb-2">የሙያ አገልግሎቶች</h2>
                <p class="text-slate-600">የዲሽ ተከላ፣ የኤሌክትሮኒክስ ጥገና እና የቧንቧ ስራዎች። የታመኑ ባለሙያዎችን ያግኙ።</p>
                <div class="mt-6 inline-flex items-center text-orange-500 font-bold">
                    ይግቡ <span class="ml-2">→</span>
                </div>
            </div>
        </a>
    </div>

    <footer class="mt-16 text-slate-400 text-sm">
        &copy; 2026 ConnectBahirDar. መብቱ በህግ የተጠበቀ ነው።
    </footer>

</body>
</html>
